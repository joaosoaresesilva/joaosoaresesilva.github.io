<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>MONDEGO RIO - MONITOR (DATALOGGER)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Courier New', monospace; background: #050505; color: #d0d0d0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { height: 35vh; width: 100%; background: #000; filter: grayscale(1) contrast(1.2) brightness(0.7); border-bottom: 2px solid #0044ff; }
        
        @keyframes pulse {
            0% { stroke-width: 2; stroke-opacity: 1; }
            50% { stroke-width: 12; stroke-opacity: 0.4; }
            100% { stroke-width: 2; stroke-opacity: 1; }
        }
        .marker-alagado { animation: pulse 1.5s infinite; }

        .sar-header { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; border-bottom: 1px solid #333; color: #00d2ff; }
        .controls { display: flex; gap: 10px; }
        .btn { padding: 4px 12px; cursor: pointer; border: none; font-family: monospace; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .btn-export { background: #0044ff; color: white; }
        .btn-clear { background: #ff3333; color: white; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 0.8; padding: 15px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #222; background: #0a0a0a; overflow-y: auto; }
        .sidebar { flex: 2.2; padding: 10px; background: #050505; overflow-y: auto; }
        .data-card { background: #111; padding: 10px; border: 1px solid #333; border-left: 4px solid #00d2ff; }
        .value-display { font-size: 1.8em; font-weight: bold; color: #fff; letter-spacing: -1px; }
        
        table { width: 100%; font-size: 10px; border-collapse: collapse; }
        th { border-bottom: 2px solid #444; padding: 10px; text-align: left; color: #00d2ff; position: sticky; top: 0; background: #050505; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid #1a1a1a; color: #ffffff; }
        .status-alagado { color: #ff3333 !important; font-weight: bold; background: rgba(255,0,0,0.1); }
        .status-provavel { color: #ffa500 !important; font-weight: bold; }
        .status-seco { color: #00ff77 !important; }
    </style>
</head>
<body>

<div class="sar-header">
    <div>FONTE: <b>APA (INFOAGUA) + IH (MARÉ)</b></div>
    <div class="controls">
        <span id="recordCount" style="color: #888; margin-right: 10px;">REGISTOS: 0</span>
        <button class="btn btn-export" onclick="downloadCSV()">Exportar CSV (R)</button>
        <button class="btn btn-clear" onclick="limparHistorico()">Limpar</button>
    </div>
    <div>SINC STATUS: <b id="syncStatus">---</b></div>
    <div>MARÉ (FIG): <b id="mareStatus">---</b></div>
</div>

<div id="map"></div>

<div class="main-container">
    <div class="panel">
        <div class="data-card">
            <h3>CAUDAL AFL(Q)</h3>
            <div id="valFlow" class="value-display">---</div><small>m³/s</small>
        </div>
        <div class="data-card">
            <h3>COTA AÇUDE (hA)</h3>
            <div id="valCota" class="value-display">---</div><small>m (Nível Real)</small>
        </div>
        <div class="data-card">
            <h3>MARÉ (M)</h3>
            <div id="valMare" class="value-display" style="color: #00d2ff;">---</div><small>m</small>
        </div>
    </div>
    <div class="sidebar">
        <table id="mainTable">
            <thead>
                <tr><th>ID PONTO / LOCALIDADE</th><th>SOLO (Z)</th><th>NÍVEL (h)</th><th>ESTADO</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- CONFIGURAÇÃO INICIAL ---
    const map = L.map('map', {zoomControl: false}).setView([40.2085, -8.4310], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const localidades = [
    // --- DISTÂNCIA 0.0 a 0.1 km (NÚCLEO CENTRAL) ---
    {id: "DOCAS DO MONDEGO", pos: [40.202750, -8.426389], cota: 18.0, muro: 17.8, reg: "A", dist: 0.05},
    {id: "MOSTEIRO STA CLARA-VELHA", pos: [40.202652, -8.433220], cota: 17.0, muro: 19.0, reg: "A", dist: 0.08},
    { id: "BARRAGEM DA AGUIEIRA", pos: [40.3375, -8.1969], cota: 125.0, reg: "M", dist: 35.5 }
];


    let apaQ = 0, apaH = 17.45, hMareReal = 0.8;
    let markers = {};
    
    // --- PERSISTÊNCIA E RECOLHA ---
    let dataHistory = JSON.parse(localStorage.getItem('mondego_data_history')) || [];

    function updateRecordCounter() {
        document.getElementById('recordCount').innerText = `REGISTOS: ${dataHistory.length}`;
    }

    function collectData() {
        const timestamp = new Date().toISOString();
        localidades.forEach(l => {
            let hFinal;
            if (l.reg === "A") {
                hFinal = apaH + (apaQ / 15000);
            } else {
                let hJusanteBase = (apaH - 4.5);
                let perdaCarga = l.dist * 0.06;
                let pesoMare = Math.max(0, 1 - (l.dist / 35));
                hFinal = hJusanteBase - perdaCarga + (apaQ / 4500) + (hMareReal * 0.6 * pesoMare);
            }

            dataHistory.push({
                timestamp, id: l.id, regiao: l.reg, caudal_q: apaQ, 
                cota_acude: apaH, mare: hMareReal, solo_z: l.cota, 
                nivel_h: hFinal.toFixed(3), diff: (hFinal - l.cota).toFixed(3)
            });
        });

        if (dataHistory.length > 25000) dataHistory = dataHistory.slice(-25000);
        localStorage.setItem('mondego_data_history', JSON.stringify(dataHistory));
        updateRecordCounter();
    }

    function downloadCSV() {
        if (dataHistory.length === 0) return alert("Sem dados.");
        const headers = Object.keys(dataHistory[0]).join(",");
        const rows = dataHistory.map(obj => Object.values(obj).join(",")).join("\n");
        const blob = new Blob([[headers, rows].join("\n")], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `mondego_export_${new Date().getTime()}.csv`;
        a.click();
    }

    function limparHistorico() {
        if(confirm("Apagar todos os dados guardados?")) {
            dataHistory = [];
            localStorage.removeItem('mondego_data_history');
            updateRecordCounter();
        }
    }

    // --- INICIALIZAR MAPA ---
    localidades.forEach(l => {
        markers[l.id] = L.circleMarker(l.pos, {
            radius: 5, weight: 1, color: '#fff', fillColor: '#00ff77', fillOpacity: 0.9
        }).addTo(map).bindTooltip(l.id, {direction: 'top', offset: [0, -5]});
    });

    // --- SINCRONIZAÇÃO ---
    async function syncAPA() {
        try {
            const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://infoagua.apambiente.pt/pt/cheias/cheia-detalhe/1627743374'));
            const data = await res.json();
            const flowMatch = data.contents.match(/([\d.,]+)\s*m3\/s/);
            const levelMatch = data.contents.match(/([\d.,]+)\s*m(?!\d|\w)/);
            if (flowMatch) apaQ = parseFloat(flowMatch[1].replace(',', '.'));
            if (levelMatch) {
                const val = parseFloat(levelMatch[1].replace(',', '.'));
                if (val > 10) apaH = val;
            }
            document.getElementById('syncStatus').innerText = "OK: " + new Date().toLocaleTimeString();
            document.getElementById('syncStatus').style.color = "#00ff77";
            collectData(); // RECOLHE DADOS APÓS SINC
        } catch (e) {
            document.getElementById('syncStatus').innerText = "ERRO APA";
            document.getElementById('syncStatus').style.color = "#ff3333";
        }
    }

    async function syncMare() {
        try {
            const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent("https://www.hidrografico.pt/json/mare.grafico.json.php?id=82"));
            const data = await res.json();
            const mareData = JSON.parse(data.contents);
            hMareReal = parseFloat(mareData.dados[mareData.dados.length - 1].valor);
        } catch (e) { console.log("Erro Maré"); }
    }

    // --- INTERFACE ---
    function updateUI() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        document.getElementById('valFlow').innerText = apaQ.toLocaleString();
        document.getElementById('valCota').innerText = apaH.toFixed(2);
        document.getElementById('valMare').innerText = hMareReal.toFixed(2);
        document.getElementById('mareStatus').innerText = hMareReal.toFixed(1) + "m";

        localidades.forEach(l => {
            let hFinal = (l.reg === "A") ? (apaH + (apaQ / 15000)) : ((apaH - 4.5) - (l.dist * 0.06) + (apaQ / 4500) + (hMareReal * 0.6 * Math.max(0, 1 - (l.dist / 35))));
            let diff = hFinal - l.cota;
            let status = diff >= 0 ? "ALAGADO" : (diff >= -0.7 ? "PROVÁVEL" : "SECO");
            let sColor = diff >= 0 ? "#ff3333" : (diff >= -0.7 ? "#ffa500" : "#00ff77");

            markers[l.id].setStyle({ fillColor: sColor, radius: diff >= 0 ? 8 : 5, color: diff >= 0 ? '#fff' : '#ffffff33' });
            const el = markers[l.id].getElement();
            if (el) diff >= 0 ? el.classList.add('marker-alagado') : el.classList.remove('marker-alagado');

            let row = tbody.insertRow();
            row.insertCell(0).innerText = l.id;
            row.insertCell(1).innerText = l.cota.toFixed(1) + "m";
            row.insertCell(2).innerText = hFinal.toFixed(2) + "m";
            let cStatus = row.insertCell(3);
            cStatus.innerText = status;
            cStatus.className = diff >= 0 ? "status-alagado" : (diff >= -0.7 ? "status-provavel" : "status-seco");
        });
    }

    // Loops
    syncAPA(); syncMare(); updateRecordCounter();
    
    setInterval(syncAPA, 300000); // 30min
    setInterval(syncMare, 1900000); // 
    setInterval(updateUI, 2000);
</script>
</body>
</html>
