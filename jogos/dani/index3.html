<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Jogo da Tabela Periódica Completa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a2e; color: white; margin: 0; padding: 20px; }
        .table-wrapper { overflow-x: auto; margin: 20px 0; padding-bottom: 20px; }
        .periodic-table { 
            display: grid; 
            grid-template-columns: 40px repeat(18, 60px); 
            grid-template-rows: repeat(11, 65px); 
            gap: 4px; 
            margin: 0 auto;
            width: max-content;
        }
        .element { 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; 
            font-size: 12px; cursor: pointer; transition: 0.2s; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .element:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 0 10px #fff; }
        .selected { transform: scale(1.3) !important; background: #f1c40f !important; color: #000 !important; z-index: 20; border: 2px solid #fff; }
        
        /* Categorias */
        .nonmetal { background: #27ae60; } .noble { background: #8e44ad; }
        .alkali { background: #e67e22; } .alkaline { background: #d35400; }
        .metalloid { background: #16a085; } .halogen { background: #c0392b; }
        .transition { background: #2980b9; } .post-transition { background: #7f8c8d; }
        .lanthanide { background: #be2edd; } .actinide { background: #eb4d4b; }
        .header-num { color: #aaa; font-size: 14px; display: flex; align-items: center; justify-content: center; }

        #timer { font-size: 32px; font-weight: bold; color: #e74c3c; margin: 10px; }
        .players { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .player-card { background: #16213e; padding: 15px; border-radius: 10px; width: 200px; border: 1px solid #3498db; }
        input { width: 90%; padding: 8px; margin: 5px 0; border-radius: 4px; border: none; }
        button { width: 100%; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; border: none; }
        .btn-concluir { background: #3498db; color: white; }
        .restart-btn { background: #27ae60; color: white; display: none; margin-top: 10px; }
        input:disabled, button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>

        let selected = null, timer = null, gameActive = false;

        function createTable() {
            const table = document.getElementById("table");
            for (let c = 1; c <= 18; c++) {
                let d = document.createElement("div"); d.className = "header-num"; 
                d.textContent = c; d.style.gridColumn = c + 1; d.style.gridRow = 1; table.appendChild(d);
            }
            for (let r = 1; r <= 7; r++) {
                let d = document.createElement("div"); d.className = "header-num"; 
                d.textContent = r; d.style.gridColumn = 1; d.style.gridRow = r + 1; table.appendChild(d);
            }
            elementsData.forEach(el => {
                let div = document.createElement("div");
                div.className = `element ${el.cat}`;
                div.innerHTML = `<strong>${el.s}</strong><small>${el.z}</small>`;
                div.style.gridRow = el.r; div.style.gridColumn = el.c;
                div.onclick = () => selectElement(div, el);
                table.appendChild(div);
            });
        }

        function setControls(state) {
            document.querySelectorAll('input, .btn-concluir').forEach(el => el.disabled = !state);
        }

        function selectElement(div, el) {
            if (gameActive) return;
            selected = el;
            document.querySelectorAll('.element').forEach(e => e.classList.remove('selected'));
            div.classList.add('selected');
            startRound();
        }

        function startRound() {
            gameActive = true; let time = 10; setControls(true);
            document.getElementById("timer").textContent = `Tempo: ${time}s`;
            timer = setInterval(() => {
                time--; document.getElementById("timer").textContent = `Tempo: ${time}s`;
                if (time <= 0) { clearInterval(timer); gameActive = false; setControls(false); alert("Fim do tempo!"); }
            }, 1000);
        }

        function submitAnswer(p) {
            if (!gameActive) return;
            let n = document.getElementById(`name${p}`).value.trim().toLowerCase();
            let z = parseInt(document.getElementById(`num${p}`).value);
            if (n === selected.n.toLowerCase() && z === selected.z) {
                clearInterval(timer); gameActive = false; setControls(false);
                document.getElementById("timer").textContent = `Vencedor: Jogador ${p}!`;
                document.getElementById(`res${p}`).style.display = "block";
            } else { alert("Errado!"); }
        }

        function restartGame() {
            selected = null; gameActive = false;
            document.querySelectorAll('.element').forEach(e => e.classList.remove('selected'));
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.querySelectorAll('.restart-btn').forEach(b => b.style.display = "none");
            document.getElementById("timer").textContent = "Escolha um elemento!";
        }

        window.onload = createTable;
